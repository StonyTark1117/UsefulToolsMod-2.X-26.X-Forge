# Forge Access Transformers - referenced from build.gradle via
# minecraft.useDefaultAccessTransformer() (file at META-INF/accesstransformer.cfg).
# Line format: <access> [-f] <class-fqn> <member-descriptor>
# Without -f the "final" flag is left alone; with -f it's stripped.

# BlockModelGenerators#createTrivialCube is protected in vanilla 26.1.2 so our
# ModBlockStateProvider, which extends ModelProvider in a different package,
# can't call it. Datagen emits cube-all models for every block this mod owns,
# so widen it to public.
public net.minecraft.client.data.models.BlockModelGenerators createTrivialCube(Lnet/minecraft/world/level/block/Block;)V

# ItemModelGenerators#generateFlatItem - used to emit the flat 2D sprite for
# items without a hand-written model. NeoForge had it package-public; Forge
# keeps it protected.
public net.minecraft.client.data.models.ItemModelGenerators generateFlatItem(Lnet/minecraft/world/item/Item;Lnet/minecraft/client/data/models/model/ModelTemplate;)V

# declareCustomModelItem registers an items/<name>.json dispatcher pointing at
# a hand-written model JSON in src/main/resources. Used by ModItemModelProvider
# for the few items (grenade, dynamite) shipping custom geometry alongside the
# generated flat sprites.
public net.minecraft.client.data.models.ItemModelGenerators declareCustomModelItem(Lnet/minecraft/world/item/Item;)V

plugins {
    id 'java'
    id 'idea'
    id 'eclipse'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[7.0.17,8)'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

// Forge 26.1 ships Java 25 to end users
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

// Include resources generated by data generators (client + server outputs live in
// sibling subdirs so each task's HashCache doesn't wipe the other on the next run).
sourceSets.main.resources {
    srcDir 'src/generated/resources/client'
    srcDir 'src/generated/resources/server'
}

// Sources excluded from compile:
//   - compat/jei/**          - JEI 26.1.2 only publishes fabric/neoforge variants.
//                              No REI/EMI Forge 26.1 build exists either (verified on
//                              Modrinth 2026-05-16: neither has any 26.x release).
//   - compat/jer/**          - JER has no 26.1 build on Modrinth.
//
// compat/wthit/**, client/UsefulToolsConfigScreen.java, and datagen/** are all
// in the source set:
//   - WTHIT 19.0.1 ships a Forge 26.1.x jar.
//   - The config screen was re-built against vanilla MC widgets + Forge's
//     ConfigScreenHandler extension point (no Cloth Config dependency).
//   - Datagen providers re-ported against Forge's BlockTagsProvider /
//     IntrinsicHolderTagsProvider / ModelProvider / ForgeAdvancementProvider
//     ctor signatures. The two protected helpers we need
//     (BlockModelGenerators#createTrivialCube and
//     ItemModelGenerators#generateFlatItem / declareCustomModelItem) are
//     widened to public via src/main/resources/META-INF/accesstransformer.cfg.
sourceSets.main.java {
    exclude 'com/stonytark/usefultoolsmod/compat/jei/**'
    exclude 'com/stonytark/usefultoolsmod/compat/jer/**'
}

minecraft {
    // ATs needed so datagen can call BlockModelGenerators#createTrivialCube and
    // ItemModelGenerators#generateFlatItem/declareCustomModelItem from a different
    // package. The file lives at the default location
    // (src/main/resources/META-INF/accesstransformer.cfg) so the one-line helper
    // suffices; ForgeGradle 7.0.25 dropped the old `accessTransformer = file(...)`
    // setter the docs still show.
    useDefaultAccessTransformer()

    runs {
        configureEach {
            workingDir = layout.projectDirectory.dir('run')

            // Strict runtime checks reject any method on a scanned mod class whose first
            // parameter extends Event but isn't @SubscribeEvent-annotated — even if the
            // method is registered programmatically via EventBus#addListener. The mod's
            // main class hosts commonSetup() and addCreative() that way, so leave the
            // checker off in dev.
            systemProperty 'eventbus.api.strictRuntimeChecks', 'false'
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            systemProperty 'forge.logging.console.level', 'debug'
        }

        register('client')

        register('server') {
            args '--nogui'
        }

        register('gameTestServer')

        // Single datagen run. Forge 26.1.x doesn't split GatherDataEvent into client /
        // server like NeoForge does — providers gate themselves on
        // includeClient()/includeServer() inside DataGenerators. Output goes into a
        // unified src/generated/resources/ tree; the per-loader subdirs the NeoForge
        // port used (src/generated/resources/{client,server}/) are still wired into
        // the source set above so the existing files keep loading at runtime.
        register('data') {
            workingDir = layout.projectDirectory.dir('run-data')
            args '--mod', mod_id, '--all',
                 '--output', layout.projectDirectory.dir('src/generated/resources'),
                 '--existing', layout.projectDirectory.dir('src/main/resources')
        }
    }
}

// Wayland workaround for runClient. Mojang's GLX#_initGlfw calls
// glfwGetWindowPos, which Wayland refuses (error 0x1000C, "The platform does
// not provide the window position") — the client crashes on init under
// Wayland-native GLFW. GLFW 3.4 has no env var to pick the X11 backend
// (GLFW_PLATFORM is an init-hint only). The reliable fix is to remove
// WAYLAND_DISPLAY from the JVM environment so GLFW can't find the Wayland
// socket and falls back to X11 via XWayland.
//
// Setting it in the `runs { register('client') { environment ... } }` block
// above doesn't work: ForgeGradle routes that into the slime-launcher options
// struct, but slime-launcher runs in-process and never reads from it. The
// JavaExec the Gradle task actually forks inherits the daemon's env — so we
// have to scrub the env on the JavaExec itself.
afterEvaluate {
    tasks.named('runClient', JavaExec).configure {
        doFirst {
            environment.remove('WAYLAND_DISPLAY')
        }
    }
}

repositories {
    minecraft.mavenizer(it)
    maven fg.forgeMaven
    maven fg.minecraftLibsMaven
    mavenCentral()

    // WTHIT + BadPackets
    maven {
        name = "bai's maven"
        url = "https://maven4.bai.lol"
        content {
            includeGroup "lol.bai"
            includeGroup "mcp.mobius.waila"
        }
    }
}

dependencies {
    implementation minecraft.dependency("net.minecraftforge:forge:${forge_version}")
    annotationProcessor 'net.minecraftforge:eventbus-validator:7.0.1'

    // WTHIT — compile against API only, full jar at runtime. Verified maven layout:
    //   https://maven4.bai.lol/mcp/mobius/waila/wthit/
    //   https://maven4.bai.lol/lol/bai/badpackets/
    compileOnly "mcp.mobius.waila:wthit-api:forge-${wthit_version}"
    runtimeOnly "mcp.mobius.waila:wthit:forge-${wthit_version}"
    runtimeOnly "lol.bai:badpackets:forge-${badpackets_version}"

    // JEI, Cloth Config, JER intentionally omitted — no Forge 26.1.x builds shipped
    // upstream as of 2026-05-16. JEI's NeoForge-only stance and Cloth Config's
    // post-1.21 Forge silence look durable; revisit if either project resumes Forge
    // releases.
}

// Expand mod metadata properties into mods.toml and pack.mcmeta at build time.
tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            forge_version          : forge_version,
            forge_version_range    : forge_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties
    }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            'Specification-Title'    : mod_id,
            'Specification-Vendor'   : mod_authors,
            'Specification-Version'  : '1',
            'Implementation-Title'   : project.name,
            'Implementation-Version' : project.jar.archiveVersion,
            'Implementation-Vendor'  : mod_authors
        ])
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea.module { downloadJavadoc = downloadSources = true }
